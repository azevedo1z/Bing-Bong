name: bingbong
description: Bing Bong - Magic 8-Ball Voice App
version: 1.3.0
publish_to: 'none'

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  flutter_riverpod: ^2.6.1
  url_launcher: ^6.3.1
  thermion_flutter: ^0.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#1A0A2E"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/models/
  fonts:
    - family: DarumadropOne
      fonts:
        - asset: assets/fonts/DarumadropOne-Regular.ttf
